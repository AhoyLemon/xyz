name: Monthly dependency update

on:
  schedule:
    - cron: '47 3 7 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Update dependencies
        run: bun update

      - name: Build
        id: build
        run: bun run build
        continue-on-error: true

      - name: Check for lockfile changes
        id: changes
        run: |
          if git diff --quiet bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: pr
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/monthly-deps-update
          commit-message: "#229 Monthly dependency update"
          title: "Monthly dependency update"
          draft: ${{ steps.build.outcome == 'failure' }}
          body: |
            Automated monthly dependency update via `bun update`.

            - **Build:** ${{ steps.build.outcome == 'success' && '✅ passed' || '❌ failed — see comment below' }}

            ${{ steps.build.outcome == 'success' && 'All packages updated within semver ranges. Build passed — ready to merge.' || 'Build failed. Keeping as draft until resolved.' }}

            Closes #229

      - name: Comment on failed build
        if: steps.changes.outputs.changed == 'true' && steps.build.outcome == 'failure'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.pr.outputs.pull-request-number }}
          body: |
            ## Build failed

            `bun run build` exited with an error after `bun update`. This PR is in draft until the issue is resolved.

            **What to check:**
            - Look at the [workflow run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full error output.
            - The most likely cause is a breaking change in a devDependency (Pug, Sass, or PostCSS).
            - Check the diff in `bun.lock` to see what version changed and review that package's changelog.

            Once the issue is resolved, mark this PR as ready for review.
